<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logs — Reverse Proxy Manager</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #292524;
            color: #e7e5e4;
            min-height: 100vh;
        }
        .container { max-width: 1100px; margin: 0 auto; padding: 2.5rem 2rem; }
        h1 { font-size: 1.8rem; color: #f97316; font-weight: 700; letter-spacing: 0.02em; }

        .section {
            background: #44403c; border-radius: 12px; padding: 1.8rem; margin-bottom: 2rem;
            border: 1px solid #57534e; box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
        }
        .section-title {
            display: flex; align-items: center; gap: 0.6rem;
            font-size: 1.05rem; font-weight: 700; color: #f97316;
            margin-bottom: 1.2rem; padding-bottom: 0.8rem; border-bottom: 1px solid #57534e;
        }
        .section-title svg { width: 20px; height: 20px; }

        .log-controls {
            display: flex; gap: 0.75rem; align-items: center; margin-bottom: 1.2rem; flex-wrap: wrap;
        }
        .log-tab {
            padding: 0.5rem 1rem; border: 1px solid #57534e; border-radius: 8px;
            background: transparent; color: #a8a29e; cursor: pointer; font-size: 0.75rem;
            font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em;
            text-decoration: none; transition: all 0.2s;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .log-tab:hover { color: #f97316; border-color: rgba(249, 115, 22, 0.35); }
        .log-tab.active { color: #f97316; border-color: #f97316; background: rgba(249, 115, 22, 0.1); }

        .btn-refresh {
            padding: 0.5rem 1rem; border: 1px solid #57534e; border-radius: 8px;
            background: transparent; color: #10b981; cursor: pointer; font-size: 0.75rem;
            font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em;
            transition: all 0.2s; margin-left: auto;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .btn-refresh:hover { border-color: rgba(16, 185, 129, 0.5); background: rgba(16, 185, 129, 0.1); }

        .log-output {
            background: #1c1917; border: 1px solid #57534e; border-radius: 8px;
            padding: 1.2rem; font-family: 'Courier New', monospace; font-size: 0.78rem;
            line-height: 1.6; color: #d6d3d1; max-height: 600px; overflow-y: auto;
            white-space: pre-wrap; word-break: break-all;
        }

        .nav-link {
            padding: 0.5rem 1.2rem; color: #e7e5e4; border-radius: 8px; text-decoration: none;
            font-size: 0.7rem; font-weight: 600; border: 1px solid #57534e; transition: all 0.2s;
            text-transform: uppercase; letter-spacing: 0.08em;
        }
        .nav-link:hover { color: #f97316; border-color: rgba(249, 115, 22, 0.35); }

        .header-bar {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 2.5rem; padding-bottom: 1.5rem; border-bottom: 1px solid #44403c;
        }

        .lines-select {
            padding: 0.4rem 0.6rem; border-radius: 6px; border: 1px solid #57534e;
            background: #57534e; color: #f5f5f4; font-size: 0.8rem;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        @media (max-width: 600px) {
            .header-bar { flex-direction: column; gap: 1rem; }
            .log-controls { flex-direction: column; align-items: flex-start; }
            .btn-refresh { margin-left: 0; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-bar">
            <h1>Logs</h1>
            <div style="display:flex; gap:0.5rem;">
                <a href="{{ url_for('admin') }}" class="nav-link">Retour admin</a>
                <a href="/" class="nav-link">Accueil</a>
            </div>
        </div>

        <div class="section">
            <div class="section-title">
                <svg viewBox="0 0 24 24" fill="none" stroke="#f97316" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                    <polyline points="14 2 14 8 20 8"/>
                    <line x1="16" y1="13" x2="8" y2="13"/>
                    <line x1="16" y1="17" x2="8" y2="17"/>
                    <polyline points="10 9 9 9 8 9"/>
                </svg>
                Journaux systeme
            </div>

            <div class="log-controls">
                {% for lt in log_types %}
                <a href="{{ url_for('logs', type=lt, lines=lines) }}"
                   class="log-tab {% if lt == log_type %}active{% endif %}">
                    {{ lt }}
                </a>
                {% endfor %}

                <select class="lines-select" onchange="window.location.href='{{ url_for('logs', type=log_type) }}&lines='+this.value">
                    {% for n in [50, 100, 200, 500] %}
                    <option value="{{ n }}" {% if n == lines %}selected{% endif %}>{{ n }} lignes</option>
                    {% endfor %}
                </select>

                <button class="btn-refresh" onclick="refreshLogs()">Actualiser</button>
            </div>

            <div class="log-output" id="log-output">{{ log_content }}</div>
        </div>
    </div>

    <script>
        function refreshLogs() {
            var btn = document.querySelector('.btn-refresh');
            btn.textContent = 'Chargement...';
            fetch('{{ url_for("logs_api") }}?type={{ log_type }}&lines={{ lines }}')
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    document.getElementById('log-output').textContent = data.content;
                    btn.textContent = 'Actualiser';
                    // Auto-scroll to bottom
                    var el = document.getElementById('log-output');
                    el.scrollTop = el.scrollHeight;
                })
                .catch(function(err) {
                    btn.textContent = 'Actualiser';
                });
        }

        // Auto-scroll to bottom on load
        (function() {
            var el = document.getElementById('log-output');
            el.scrollTop = el.scrollHeight;
        })();
    </script>
</body>
</html>
