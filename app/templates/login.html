<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion — Reverse Proxy Manager</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-box {
            background: #1e293b;
            border-radius: 16px;
            padding: 2.5rem;
            width: 100%;
            max-width: 400px;
            border: 1px solid #334155;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
        }
        .login-box h1 {
            text-align: center;
            font-size: 1.5rem;
            color: #38bdf8;
            margin-bottom: 0.5rem;
        }
        .login-box .subtitle {
            text-align: center;
            font-size: 0.85rem;
            color: #64748b;
            margin-bottom: 2rem;
        }
        .icon {
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .icon svg {
            width: 56px;
            height: 56px;
        }
        .form-group {
            margin-bottom: 1.2rem;
        }
        .form-group label {
            display: block;
            font-size: 0.85rem;
            color: #94a3b8;
            margin-bottom: 0.4rem;
        }
        .form-group input {
            width: 100%;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            border: 1px solid #475569;
            background: #0f172a;
            color: #e2e8f0;
            font-size: 1rem;
            transition: border-color 0.2s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #38bdf8;
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.15);
        }
        .form-group input:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .btn-login {
            width: 100%;
            padding: 0.75rem;
            border: none;
            border-radius: 8px;
            background: #0ea5e9;
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-login:hover { background: #0284c7; }
        .btn-login:disabled {
            background: #475569;
            cursor: not-allowed;
        }
        .error-msg {
            background: #7f1d1d;
            color: #fca5a5;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-bottom: 1.2rem;
            text-align: center;
        }
        .blocked-msg {
            background: #7f1d1d;
            color: #fca5a5;
            padding: 1rem;
            border-radius: 8px;
            font-size: 0.9rem;
            margin-bottom: 1.2rem;
            text-align: center;
            border: 1px solid #dc2626;
        }
        .blocked-msg svg {
            display: block;
            margin: 0 auto 0.5rem;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="icon">
            <svg viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect x="4" y="24" width="48" height="28" rx="6" stroke="#38bdf8" stroke-width="2.5" fill="none"/>
                <path d="M16 24V16a12 12 0 0 1 24 0v8" stroke="#38bdf8" stroke-width="2.5" fill="none" stroke-linecap="round"/>
                <circle cx="28" cy="38" r="4" fill="#38bdf8"/>
                <line x1="28" y1="42" x2="28" y2="46" stroke="#38bdf8" stroke-width="2.5" stroke-linecap="round"/>
            </svg>
        </div>
        <h1>Reverse Proxy Manager</h1>
        <p class="subtitle">Connexion requise</p>

        {% if blocked %}
        <div class="blocked-msg">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="12" cy="12" r="10" stroke="#fca5a5" stroke-width="2"/>
                <line x1="4.93" y1="4.93" x2="19.07" y2="19.07" stroke="#fca5a5" stroke-width="2"/>
            </svg>
            {{ error }}
        </div>
        {% elif error %}
        <div class="error-msg">{{ error }}</div>
        {% endif %}

        <form method="POST" action="{{ url_for('login') }}">
            <div class="form-group">
                <label for="password">Mot de passe</label>
                <input type="password" id="password" name="password" placeholder="Entrez le mot de passe"
                       autofocus required {% if blocked %}disabled{% endif %}>
            </div>
            <button type="submit" class="btn-login" {% if blocked %}disabled{% endif %}>
                {% if blocked %}Accès bloqué{% else %}Se connecter{% endif %}
            </button>
        </form>
    </div>
</body>
</html>
