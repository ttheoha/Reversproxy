<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion — Reverse Proxy Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f5f0eb;
            color: #2c2420;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image:
                radial-gradient(ellipse at 20% 50%, rgba(180, 142, 78, 0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 50%, rgba(180, 142, 78, 0.05) 0%, transparent 60%);
        }
        .login-box {
            background: #ffffff;
            border-radius: 2px;
            padding: 3rem 2.5rem;
            width: 100%;
            max-width: 420px;
            border: 1px solid rgba(180, 142, 78, 0.2);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
            position: relative;
        }
        .login-box::before {
            content: '';
            position: absolute;
            top: 0; left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #b48e4e, transparent);
        }
        .icon {
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .icon svg {
            width: 48px;
            height: 48px;
        }
        .login-box h1 {
            text-align: center;
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            font-weight: 600;
            color: #2c2420;
            margin-bottom: 0.4rem;
            letter-spacing: 0.02em;
        }
        .login-box .subtitle {
            text-align: center;
            font-size: 0.8rem;
            color: #9a8e80;
            margin-bottom: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            font-weight: 400;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            font-size: 0.75rem;
            color: #8a7d6b;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 0.85rem 1rem;
            border-radius: 2px;
            border: 1px solid #ddd5cb;
            background: #faf8f5;
            color: #2c2420;
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            transition: border-color 0.3s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #b48e4e;
        }
        .form-group input:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .btn-login {
            width: 100%;
            padding: 0.85rem;
            border: 1px solid #b48e4e;
            border-radius: 2px;
            background: #b48e4e;
            color: #fff;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            font-family: 'Inter', sans-serif;
        }
        .btn-login:hover {
            background: #a07a3e;
        }
        .btn-login:disabled {
            border-color: #ddd5cb;
            color: #bbb3a8;
            cursor: not-allowed;
            background: #ece7e0;
        }
        .error-msg {
            background: #fef2f0;
            color: #b5544a;
            padding: 0.75rem 1rem;
            border-radius: 2px;
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
            text-align: center;
            border: 1px solid rgba(181, 84, 74, 0.15);
        }
        .blocked-msg {
            background: #fef2f0;
            color: #b5544a;
            padding: 1rem;
            border-radius: 2px;
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
            text-align: center;
            border: 1px solid rgba(181, 84, 74, 0.25);
        }
        .blocked-msg svg {
            display: block;
            margin: 0 auto 0.5rem;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="icon">
            <svg viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect x="4" y="24" width="48" height="28" rx="2" stroke="#b48e4e" stroke-width="1.5" fill="none"/>
                <path d="M16 24V16a12 12 0 0 1 24 0v8" stroke="#b48e4e" stroke-width="1.5" fill="none" stroke-linecap="round"/>
                <circle cx="28" cy="38" r="3" fill="#b48e4e"/>
                <line x1="28" y1="41" x2="28" y2="46" stroke="#b48e4e" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
        </div>
        <h1>Reverse Proxy Manager</h1>
        <p class="subtitle">Connexion requise</p>

        {% if blocked %}
        <div class="blocked-msg">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
                <circle cx="12" cy="12" r="10" stroke="#b5544a" stroke-width="1.5"/>
                <line x1="4.93" y1="4.93" x2="19.07" y2="19.07" stroke="#b5544a" stroke-width="1.5"/>
            </svg>
            {{ error }}
        </div>
        {% elif error %}
        <div class="error-msg">{{ error }}</div>
        {% endif %}

        <form method="POST" action="{{ url_for('login') }}">
            {% if ldap_enabled %}
            <div class="form-group">
                <label for="username">Identifiant</label>
                <input type="text" id="username" name="username" placeholder="Identifiant LDAP"
                       autofocus {% if blocked %}disabled{% endif %}>
            </div>
            {% endif %}
            <div class="form-group">
                <label for="password">Mot de passe</label>
                <input type="password" id="password" name="password" placeholder="Mot de passe"
                       {% if not ldap_enabled %}autofocus{% endif %} required {% if blocked %}disabled{% endif %}>
            </div>
            {% if ldap_enabled %}
            <p style="font-size:0.7rem; color:#9a8e80; margin-bottom:1.2rem; text-align:center;">
                Connectez-vous avec vos identifiants LDAP, ou laissez le champ identifiant vide pour utiliser le mot de passe local.
            </p>
            {% endif %}
            <button type="submit" class="btn-login" {% if blocked %}disabled{% endif %}>
                {% if blocked %}Acces bloque{% else %}Se connecter{% endif %}
            </button>
        </form>
    </div>
</body>
</html>
