<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion — Reverse Proxy Manager</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #292524;
            color: #e7e5e4;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-box {
            background: #44403c;
            border-radius: 12px;
            padding: 3rem 2.5rem;
            width: 100%;
            max-width: 420px;
            border: 1px solid #57534e;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            position: relative;
        }
        .login-box::before {
            content: '';
            position: absolute;
            top: 0; left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, transparent, #f97316, transparent);
            border-radius: 0 0 4px 4px;
        }
        .icon {
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .icon svg {
            width: 48px;
            height: 48px;
        }
        .login-box h1 {
            text-align: center;
            font-size: 1.5rem;
            font-weight: 700;
            color: #f97316;
            margin-bottom: 0.4rem;
            letter-spacing: 0.02em;
        }
        .login-box .subtitle {
            text-align: center;
            font-size: 0.8rem;
            color: #78716c;
            margin-bottom: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            font-weight: 400;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            font-size: 0.75rem;
            color: #a8a29e;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-weight: 600;
        }
        .form-group input {
            width: 100%;
            padding: 0.85rem 1rem;
            border-radius: 8px;
            border: 1px solid #78716c;
            background: #57534e;
            color: #f5f5f4;
            font-size: 0.95rem;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .form-group input::placeholder { color: #a8a29e; }
        .form-group input:focus {
            outline: none;
            border-color: #f97316;
            box-shadow: 0 0 0 2px rgba(249, 115, 22, 0.3);
        }
        .form-group input:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .btn-login {
            width: 100%;
            padding: 0.85rem;
            border: none;
            border-radius: 8px;
            background: #f97316;
            color: #fff;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .btn-login:hover {
            background: #ea580c;
        }
        .btn-login:disabled {
            background: #57534e;
            color: #78716c;
            cursor: not-allowed;
        }
        .error-msg {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
            text-align: center;
            border: 1px solid rgba(239, 68, 68, 0.25);
        }
        .blocked-msg {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
            padding: 1rem;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
            text-align: center;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }
        .blocked-msg svg {
            display: block;
            margin: 0 auto 0.5rem;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="icon">
            <svg viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect x="4" y="24" width="48" height="28" rx="2" stroke="#f97316" stroke-width="1.5" fill="none"/>
                <path d="M16 24V16a12 12 0 0 1 24 0v8" stroke="#f97316" stroke-width="1.5" fill="none" stroke-linecap="round"/>
                <circle cx="28" cy="38" r="3" fill="#f97316"/>
                <line x1="28" y1="41" x2="28" y2="46" stroke="#f97316" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
        </div>
        <h1>Reverse Proxy Manager</h1>
        <p class="subtitle">Connexion requise</p>

        {% if blocked %}
        <div class="blocked-msg">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
                <circle cx="12" cy="12" r="10" stroke="#ef4444" stroke-width="1.5"/>
                <line x1="4.93" y1="4.93" x2="19.07" y2="19.07" stroke="#ef4444" stroke-width="1.5"/>
            </svg>
            {{ error }}
        </div>
        {% elif error %}
        <div class="error-msg">{{ error }}</div>
        {% endif %}

        <form method="POST" action="{{ url_for('login') }}">
            {% if ldap_enabled %}
            <div class="form-group">
                <label for="username">Identifiant</label>
                <input type="text" id="username" name="username" placeholder="Identifiant LDAP"
                       autofocus {% if blocked %}disabled{% endif %}>
            </div>
            {% endif %}
            <div class="form-group">
                <label for="password">Mot de passe</label>
                <input type="password" id="password" name="password" placeholder="Mot de passe"
                       {% if not ldap_enabled %}autofocus{% endif %} required {% if blocked %}disabled{% endif %}>
            </div>
            {% if ldap_enabled %}
            <p style="font-size:0.7rem; color:#78716c; margin-bottom:1.2rem; text-align:center;">
                Connectez-vous avec vos identifiants LDAP, ou laissez le champ identifiant vide pour utiliser le mot de passe local.
            </p>
            {% endif %}
            <button type="submit" class="btn-login" {% if blocked %}disabled{% endif %}>
                {% if blocked %}Acces bloque{% else %}Se connecter{% endif %}
            </button>
        </form>
    </div>
</body>
</html>
