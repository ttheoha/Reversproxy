user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 1g;

    # Shared SSL settings
    ssl_certificate /data/certs/selfsigned.crt;
    ssl_certificate_key /data/certs/selfsigned.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    # Redirect HTTP -> HTTPS
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # Dynamic proxy configs - MUST be included before the fallback admin block
    include /etc/nginx/conf.d/proxy.conf;

    # Panel web d'administration (HTTPS) - fallback for unmatched hosts
    # This MUST be the last server block on port 443
    server {
        listen 443 ssl default_server;
        server_name _;

        location / {
            proxy_pass http://127.0.0.1:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
